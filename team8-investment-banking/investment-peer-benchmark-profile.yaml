dataContractSpecification: 1.1.0
id: urn:businessdomain:nova-banka:investment-banking:investment-peer-benchmark-profile

info:
  title: DP_INVESTMENT_PEER_BENCHMARK_PROFILE
  name: Investment Peer Benchmark Profile
  version: 1.0.0
  status: active
  description: |
    Analytický produkt identifikující statisticky podobné společnosti pomocí clusteringu.
    Use Cases: Investiční benchmarking, Korporátní risk profiling
  owner: Nova Banka \ Investment Banking \ Tym 8
  contact:
    name: Head of Investment Banking
    email: investment.banking@nova-banka.cz

servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: vse_banka
    schema: investment_banking
    table: dp_investment_peer_benchmark_profile

schema:
  - name: dp_investment_peer_benchmark_profile
    description: Peer group prirazeni a benchmark metriky
    fields:
      - name: as_of_date
        type: date
        description: Business datum pro ktere je benchmark vypocitan
        required: true
      - name: company_id
        type: string
        description: Identifikator korporatni entity
        required: true
      - name: peer_group_id
        type: string
        description: Identifikator peer clusteru
        required: true
      - name: similarity_score
        type: decimal
        description: Skore podobnosti spolecnosti k peer group
        required: true
      - name: created_at
        type: timestamp
        description: Cas vygenerovani zaznamu
        required: true

quality:
  - rule: not_null
    field: as_of_date
    description: Datum nesmi byt prazdne
  - rule: not_null
    field: company_id
    description: ID spolecnosti nesmi byt prazdne
  - rule: not_null
    field: peer_group_id
    description: ID peer group nesmi byt prazdne
  - rule: range
    field: similarity_score
    description: Similarity score musi byt 0 az 1

sla:
  availability: 99.5%
  data_latency: D+1
  retention_period: 60 months
  support_contact: investment.banking@nova-banka.cz
