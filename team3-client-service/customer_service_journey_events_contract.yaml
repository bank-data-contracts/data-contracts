dataContractSpecification: 1.1.0
id: urn:nova-banka:data-contract:customer-service:journey-events:0.1.0

info:
  title: Customer Service Journey Events
  name: Customer Service Journey Events
  product_type: EVENT
  maturity_score: 30%
  version: 0.1.0
  status: draft
  description: |
    Data latency: Near real-time — records available within 15 minutes of source generation; downstream daily aggregation for analytics.
    Business Entity: Customer Interaction Event / Digital Journey Step
    Business Purpose: Provides near-real-time visibility into customer interactions and digital journey events across all service channels. Enables identification of bottlenecks, drop-off points and inefficient process steps, supports monitoring of self-service adoption and process optimisation, and feeds daily aggregations for Customer Service, Digital Banking and Strategy reporting.
    Consumers: Customer Service management, team leaders, quality and operations teams, Digital Banking management, Retail Operations, Team 6 (Strategy Profitability Aggregation)
    Data Sources: CRM (service processes), Ticketing / Case Management, Digital channels (IB/MB event logs), Contact center system, Customer Service Customer Profile (Team 3)

  x-regulatory:
    gdpr_relevant: false
    critical_data_element: true
    regulatory_framework: "None"

  owner: "Nova Banka"

  contact:
    name: Artur Zakharov
    email: zaka09@vse.cz

servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-nova-banka-prod
    schema: customer_service
    table: cs_journey_events
  DEVELOPMENT:
    type: databricks
    host: nova-banka-dev.cloud.databricks.com
    environment: development
    catalog: datamesh-nova-banka-dev
    schema: customer_service
    table: cs_journey_events

schema:
  - name: cs_journey_events
    description: Near-real-time event records representing individual customer interaction events and digital journey steps across all service channels.

    fields:
      - name: record_id
        type: string
        description: Unique record identifier (UUID v4)
        required: true
        unique: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: business_date
        type: date
        description: Business processing date (YYYY-MM-DD)
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: region
        type: string
        description: Geographic region [CZ, SK]
        required: true
        enum: [CZ, SK]
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: interaction_id
        type: string
        description: Unique identifier for the parent customer interaction session or case.
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: customer_id
        type: string
        description: Non-sensitive technical identifier linking the event to an internal customer record. Does not directly expose personal data.
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: event_timestamp
        type: timestamp
        description: ISO 8601 timestamp of the interaction event or journey step occurrence (UTC).
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: channel_name
        type: string
        description: Service channel through which the interaction occurred (e.g., IB, MB, Branch, ContactCenter, ATM).
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: interaction_type
        type: string
        description: Type / category of the customer interaction (e.g., complaint, inquiry, transaction, onboarding).
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: journey_step
        type: string
        description: Controlled-vocabulary label for the specific step within the customer journey (e.g., login, product-select, confirm, abandon).
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: event_status
        type: string
        description: Controlled-vocabulary outcome status of the event (e.g., completed, failed, abandoned, pending).
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: platform
        type: string
        description: Technical platform or application on which the event was captured (e.g., IB-web, MB-iOS, MB-android, CRM).
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: self_service_flag
        type: boolean
        description: Indicates whether the interaction was completed through a self-service channel without agent involvement.
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: drop_off_flag
        type: boolean
        description: Indicates whether the customer abandoned the journey at this step before completion.
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: completion_flag
        type: boolean
        description: Indicates whether the full interaction or journey was successfully completed.
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

quality:
  - rule: not_null
    field: record_id

  - rule: unique
    field: record_id

  - rule: not_null
    field: interaction_id

  - rule: not_null
    field: customer_id

  - rule: not_null
    field: event_timestamp

  - rule: not_null
    field: channel_name

  - rule: not_null
    field: interaction_type

  - rule: row_count
    min: 1000
    max: 500000
    description: "Detects data distribution anomalies (volume drop/spike) based on expected daily digital traffic range of 1,000–500,000 interaction event records."

  - rule: accepted_values
    field: region
    values: [CZ, SK]

  - rule: accepted_values
    field: event_status
    values: [completed, failed, abandoned, pending]

  - rule: accepted_values
    field: self_service_flag
    values: [true, false]

  - rule: accepted_values
    field: drop_off_flag
    values: [true, false]

  - rule: accepted_values
    field: completion_flag
    values: [true, false]

sla:
  availability: 99.5%
  data_latency: "15 minutes (near real-time from source generation)"
  retention_period: 36 months

x-dawiso:
  data_product:
    dawiso_status: design
    domain: Customer Service
    business_owner: "Customer Service Management - cs-management@nova-banka.cz"
    product_owner: "Artur Zakharov - zaka09@vse.cz"
    data_steward: "Artur Zakharov - zaka09@vse.cz"
    tags:
      - customer-journey
      - digital-events
      - near-real-time
      - customer-service
    classification: "Event Data Product"
    data_classification: Internal
    lineage:
      upstream:
        - name: CRM
          type: internal-system
          description: "Service process records and case data from the bank's CRM platform."
        - name: Ticketing / Case Management
          type: internal-system
          description: "Case and ticket lifecycle events from the case management system."
        - name: Digital Channels Event Logs
          type: internal-system
          description: "Raw event logs from Internet Banking (IB) and Mobile Banking (MB) digital platforms."
        - name: Contact Center System
          type: internal-system
          description: "Interaction records from the contact center telephony and routing platform."
        - name: Customer Service Customer Profile (Team 3)
          type: data-product
          description: "Customer profile data product maintained by Team 3, providing customer segment and profile context."
      downstream:
        - name: Strategy Profitability Aggregation (Team 6)
          type: data-product
          description: "Daily aggregated profitability and journey metrics consumed by Team 6 for strategic reporting."
        - name: Customer Service Management Reporting
          type: data-product
          description: "Daily aggregated operational and quality reports for Customer Service management and team leaders."
        - name: Digital Banking Analytics
          type: data-product
          description: "Self-service adoption and digital channel performance analytics for Digital Banking management."
    rules_ko:
      - "record_id must be a valid UUID v4"
      - "interaction_id must not be null"
      - "customer_id must not be null"
      - "event_timestamp must not be null and must conform to ISO 8601 (UTC)"
      - "channel_name must not be null"
      - "interaction_type must not be null"
      - "event_status must belong to the controlled vocabulary: [completed, failed, abandoned, pending]"
      - "journey_step must belong to a controlled vocabulary when populated"
      - "self_service_flag, drop_off_flag and completion_flag must be boolean values"
      - "Volume must be within expected daily range of 1,000–500,000 rows"
      - "Data must be available within 15 minutes of source generation"
    retention:
      period: "36 months"
      rationale: "Aligned with Nova Banka operational data retention policy and regulatory requirements for customer interaction audit trails."

glossary_entry:
  term: "Customer Journey Event"
  definition: >
    An atomic, timestamped record representing a single step or touchpoint within a customer's interaction across one or more service channels of Nova Banka. A Customer Journey Event captures the channel, interaction type, journey step, platform and outcome flags (self-service, drop-off, completion) for a given customer interaction identifier, enabling end-to-end visibility of customer experience and process efficiency.
  fibo_class: "fibo-fnd-arr-ev:Event"
  fibo_uri: "https://spec.edmcouncil.org/fibo/ontology/FND/Arrangements/Events/Event"
  domain: Customer Service
  dawiso_status: draft
  steward: "Artur Zakharov - zaka09@vse.cz"
  synonyms:
    - Customer Interaction Event
    - Digital Journey Step
    - Service Channel Event
  acronyms:
    - CJE
  related_capability: "Customer Journey Analytics / Self-Service Monitoring"
  related_terms:
    - "Customer Interaction"
    - "Digital Channel"
    - "Self-Service Adoption"
    - "Drop-Off Rate"
    - "Process Completion Rate"
    - "Customer Service Customer Profile"
