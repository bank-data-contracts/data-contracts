  dawiso_status: draft
  steward: "Artur Zakharov - zaka09@vse.cz"
  synonyms:
    - Customer Master Profile
    - Unified Customer View
    - Single Customer View
    - Customer Golden Record
  acronyms:
    - SCV
    - UCV
  related_capability: "Omnichannel Customer Service & CRM"
  related_terms:
