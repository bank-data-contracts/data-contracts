dataContractSpecification: 1.1.0
id: nova-banka-cs-360-customer-profile-state-v0.1.0
info:
  title: Customer Service 360 Customer Profile State
  name: Customer Service 360 Customer Profile State
  product_type: STATE
  maturity_score: 30%
  version: 0.1.0
  status: draft
  description: |
    Data latency: Daily EOD / T+1, with optional intraday refresh for selected service-relevant attributes.
    Business Entity: Customer (Individual or Corporate)
    Business Purpose: Consolidated 360-degree customer profile for omnichannel customer service. Combines core customer attributes, service-relevant contact information, consent status, account and product relationship indicators, and selected service context attributes needed for efficient customer handling in CRM and assisted service channels. Designed to reduce handling time, improve service consistency across channels, and provide immediate access to customer context without switching between multiple systems.
    Consumers: Call center, branch staff, chat support, Team 1, Team 3, Team 4, Team 5, Team 8, CRM users, customer service operations.
    Data Sources: CRM, Core Banking System (products and accounts), transaction history, customer master data, Retail Sales Customer Acquisition History (Team 1), ESG Risk Score Profile (Team 5), ESG Risk Energy Profile (Team 5).

  x-regulatory:
    gdpr_relevant: true
    critical_data_element: true
    regulatory_framework: "GDPR"

owner: Nova Banka
contact:
  name: Artur Zakharov
  email: zaka09@vse.cz

servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-nova-banka-prod
    schema: customer_service
    table: cs_360_customer_profile_state
  DEVELOPMENT:
    type: databricks
    host: nova-banka-dev.cloud.databricks.com
    environment: development
    catalog: datamesh-nova-banka-dev
    schema: customer_service
    table: cs_360_customer_profile_state

schema:
  - name: cs_360_customer_profile_state
    description: Consolidated 360-degree customer profile record for omnichannel customer service operations. One record per active customer, refreshed daily EOD.

    fields:
      - name: record_id
        type: string
        description: Unique record identifier (UUID v4)
        required: true
        unique: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: business_date
        type: date
        description: Business processing date (YYYY-MM-DD)
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: region
        type: string
        description: Geographic region [CZ, SK]
        required: true
        enum: [CZ, SK]
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: customer_id
        type: string
        description: Non-sensitive technical identifier for the customer. Used as a join key across systems.
        required: true
        unique: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: customer_type
        type: string
        description: Classification of the customer entity type. Controlled vocabulary — allowed values are 'individual' and 'corporate'.
        required: true
        enum: [individual, corporate]
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: customer_segment
        type: string
        description: Business segment assigned to the customer (e.g., mass, affluent, SME, corporate). Used for service routing and prioritization.
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: preferred_contact_channel
        type: string
        description: Customer's preferred contact channel from a controlled vocabulary (e.g., phone, email, branch, chat, mobile_app).
        required: false
        enum: [phone, email, branch, chat, mobile_app]
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: phone_number
        type: string
        description: Customer's primary phone number. Personal data — populated only when available and valid.
        required: false
        x-compliance:
          is_pii: true
          sensitivity: Confidential
          legal_basis: Contractual

      - name: email
        type: string
        description: Customer's primary email address. Personal data — populated only when available and valid.
        required: false
        x-compliance:
          is_pii: true
          sensitivity: Confidential
          legal_basis: Contractual

      - name: active_account_count
        type: integer
        description: Number of currently active accounts held by the customer. Must be non-negative.
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: active_product_count
        type: integer
        description: Number of currently active banking products held by the customer. Must be non-negative.
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: primary_service_channel
        type: string
        description: The primary channel through which the customer is most frequently serviced (e.g., branch, call_center, digital).
        required: false
        enum: [branch, call_center, chat, digital, mobile_app]
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: marketing_consent_flag
        type: boolean
        description: Indicates whether the customer has provided valid consent to receive marketing communications. Required for GDPR-compliant outreach.
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

quality:
  - rule: not_null
    field: record_id

  - rule: unique
    field: record_id

  - rule: not_null
    field: customer_id

  - rule: unique
    field: customer_id

  - rule: row_count
    min: 10000
    max: 500000
    description: "Detects data distribution anomalies (volume drop/spike) in daily EOD profile load. Expected active customer population range for CZ+SK market."

  - rule: accepted_values
    field: region
    values: [CZ, SK]

  - rule: accepted_values
    field: customer_type
    values: [individual, corporate]

  - rule: accepted_values
    field: preferred_contact_channel
    values: [phone, email, branch, chat, mobile_app]

  - rule: not_negative
    field: active_account_count
    description: "active_account_count must be >= 0"

  - rule: not_negative
    field: active_product_count
    description: "active_product_count must be >= 0"

  - rule: regex
    field: phone_number
    pattern: "^\\+?[0-9 \\-\\(\\)]{7,20}$"
    description: "Phone number must be in a valid international or local format when populated."

  - rule: regex
    field: email
    pattern: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
    description: "Email must be a valid format when populated."

sla:
  availability: 99.5%
  data_latency: Daily EOD / T+1; optional intraday refresh for selected service attributes
  retention_period: 36 months

