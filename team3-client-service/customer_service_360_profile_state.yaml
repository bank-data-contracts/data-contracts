  definition: "A consolidated, unified view of a customer that aggregates core identifying attributes, contact information, consent status, product and account relationships, and service context indicators from multiple source systems. Designed to enable efficient, consistent omnichannel customer service without requiring agents to switch between multiple operational systems."
