dataContractSpecification: 1.1.0
id: urn:nova-banka:data-contract:customer-service:kpi-performance:0.1.0
info:
  title: Customer Service KPI Performance
  name: Customer Service KPI Performance
  product_type: AGGREGATION
  maturity_score: 30%
  version: 0.1.0
  status: draft
  description: |
    Data latency: Daily EOD / T+1 for service KPIs; model-based enrichment available upon source model output refresh.
    Business Entity: Aggregated Customer Service KPI Snapshot — each record represents a rolled-up performance metric
      snapshot by reporting period and service dimension (team, channel, request type, branch, or customer segment).
    Business Purpose: Supports standardized monitoring of service quality and operational performance, including NPS,
      first contact resolution, SLA compliance, average handling time, escalations, and retention/personalization indicators.
      Enables management reporting and decision-making.
    Consumers: Senior management, Customer Service management, team leaders, performance management,
      Team 6 (Strategy KPI Aggregation), management reporting and dashboard users.
    Data Sources: NPS / Feedback tool, model outputs (NBA and churn scoring), HR / Agent master data,
      Customer Service Journey Events (Team 3), CRM, case and complaint handling records.
  owner: Nova Banka
  contact:
  name: Artur Zakharov
  email: zaka09@vse.cz

  x-regulatory:
    gdpr_relevant: false
    critical_data_element: true
    regulatory_framework: "BCBS 239"



servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-nova-banka-prod
    schema: customer_service
    table: cs_kpi_performance
  DEVELOPMENT:
    type: databricks
    host: nova-banka-dev.cloud.databricks.com
    environment: development
    catalog: datamesh-nova-banka-dev
    schema: customer_service
    table: cs_kpi_performance

schema:
  - name: cs_kpi_performance
    description: >
      Aggregated Customer Service KPI snapshot table. Each row represents a unique combination
      of reporting period and service dimension with rolled-up performance metrics.
    fields:
      - name: record_id
        type: string
        description: Unique record identifier (UUID v4)
        required: true
        unique: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: business_date
        type: date
        description: Business processing date (YYYY-MM-DD)
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: region
        type: string
        description: Geographic region [CZ, SK]
        required: true
        enum: [CZ, SK]
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: reporting_period
        type: string
        description: >
          Reporting period identifier (e.g. 2025-Q1, 2025-01). Represents the aggregation
          time window for the KPI snapshot.
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: team_name
        type: string
        description: >
          Name of the Customer Service team responsible for handling interactions
          in the given period. Must follow controlled vocabulary.
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: channel_name
        type: string
        description: >
          Service channel through which customer interactions were handled
          (e.g. phone, email, chat, branch). Must follow controlled vocabulary.
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: request_type
        type: string
        description: >
          Category or type of customer request handled during the reporting period
          (e.g. complaint, inquiry, transaction support). Must follow controlled vocabulary.
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: customer_segment
        type: string
        description: >
          Customer segment grouping for the aggregated interactions
          (e.g. retail, SME, premium). Non-personal aggregate label.
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: interaction_count
        type: integer
        description: >
          Total number of customer interactions handled in the reporting period
          for the given dimension combination. Must be non-negative.
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: nps_score_avg
        type: number
        description: >
          Average Net Promoter Score recorded across all surveyed interactions
          in the reporting period. Valid range: -100 to 100.
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: first_contact_resolution_rate
        type: number
        description: >
          Proportion of interactions resolved on first contact without escalation
          or follow-up. Value must be between 0 and 1 (inclusive).
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: sla_compliance_rate
        type: number
        description: >
          Proportion of interactions handled within the agreed Service Level Agreement
          response/resolution timeframe. Value must be between 0 and 1 (inclusive).
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: avg_handling_time_seconds
        type: number
        description: >
          Average time in seconds spent handling a single customer interaction
          during the reporting period. Must be non-negative.
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: escalation_rate
        type: number
        description: >
          Proportion of interactions escalated to a higher support tier or specialist
          during the reporting period. Value must be between 0 and 1 (inclusive).
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: churn_risk_band
        type: string
        description: >
          Aggregated churn risk classification band derived from model scoring outputs
          (e.g. Low, Medium, High). Represents the dominant risk band for the segment
          in the reporting period. Non-personal aggregate label.
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: nba_action_category
        type: string
        description: >
          Next Best Action category assigned by the NBA model to the customer segment
          and interaction type (e.g. retention_offer, upsell, service_recovery).
          Non-personal aggregate label.
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

quality:
  - rule: not_null
    field: record_id

  - rule: unique
    field: record_id

  - rule: not_null
    field: business_date

  - rule: not_null
    field: reporting_period

  - rule: not_null
    field: team_name

  - rule: not_null
    field: channel_name

  - rule: not_null
    field: request_type

  - rule: accepted_values
    field: region
    values: [CZ, SK]

  - rule: row_count
    min: 100
    max: 50000
    description: "Detects data distribution anomalies (volume drop/spike) per reporting day"

  - rule: range
    field: nps_score_avg
    min: -100
    max: 100
    description: "NPS score must be within valid NPS range (-100 to 100)"

  - rule: range
    field: first_contact_resolution_rate
    min: 0
    max: 1
    description: "First contact resolution rate must be a proportion between 0 and 1"

  - rule: range
    field: sla_compliance_rate
    min: 0
    max: 1
    description: "SLA compliance rate must be a proportion between 0 and 1"

  - rule: range
    field: escalation_rate
    min: 0
    max: 1
    description: "Escalation rate must be a proportion between 0 and 1"

  - rule: range
    field: avg_handling_time_seconds
    min: 0
    description: "Average handling time must be non-negative"

  - rule: range
    field: interaction_count
    min: 0
    description: "Interaction count must be non-negative"

sla:
  availability: 99.5%
  data_latency: Daily EOD / T+1
  retention_period: 36 months

x-dawiso:
  data_product:
    dawiso_status: design
    domain: Customer Service
    business_owner: Customer Service Management
    product_owner: "Artur Zakharov - zaka09@vse.cz"
    data_steward: "Konysbayev Nurdaulet - konn07@vse.cz"
    tags:
      - customer-service
      - kpi
      - aggregation
      - performance-monitoring
      - nps
      - sla
    classification: "AGGREGATION Data Product"
    data_classification: Internal
    lineage:
      upstream:
        - name: NPS / Feedback Tool
          type: internal-system
          description: "Source of NPS scores and customer satisfaction feedback"
        - name: NBA and Churn Scoring Models
          type: internal-system
          description: "Model outputs providing churn risk bands and next best action categories"
        - name: HR / Agent Master Data
          type: internal-system
          description: "Agent and team reference data for dimension resolution"
        - name: Customer Service Journey Events
          type: data-product
          description: "Event-level interaction data produced by Team 3 (upstream event product)"
        - name: CRM
          type: internal-system
          description: "Customer relationship management system; source of case and segment data"
        - name: Case and Complaint Handling Records
          type: internal-system
          description: "Operational records of complaints, escalations, and case management"
      downstream:
        - name: Strategy KPI Aggregation (Team 6)
          type: data-product
          description: "Consumes service KPIs for enterprise-level strategy and performance reporting"
        - name: Management Reporting Dashboard
          type: data-product
          description: "Operational dashboards for senior management and team leaders"
    rules_ko:
      - "record_id must be a valid UUID v4"
      - "Volume must be within expected range (100–50000 rows per reporting day)"
      - "nps_score_avg must be between -100 and 100"
      - "first_contact_resolution_rate, sla_compliance_rate, and escalation_rate must be between 0 and 1"
      - "interaction_count and avg_handling_time_seconds must be non-negative"
      - "team_name, channel_name, and request_type must conform to controlled vocabularies"
    retention:
      period: "36 months"
      rationale: "Operational KPI history required for trend analysis, regulatory audit trails, and management reporting cycles"

glossary_entry:
  term: "Customer Service KPI Performance"
  definition: >
    A structured, time-partitioned aggregation of operational performance indicators for a bank's customer
    service function, computed across defined dimensions such as team, channel, request type, and customer
    segment. The product consolidates metrics including Net Promoter Score, First Contact Resolution rate,
    SLA Compliance rate, Average Handling Time, and Escalation rate to enable standardized monitoring,
    benchmarking, and management reporting of service quality and efficiency.
  fibo_class: "fibo-fnd-arr-rep:Report"
  fibo_uri: "https://spec.edmcouncil.org/fibo/ontology/FND/Arrangements/Reporting/Report"
  domain: Customer Service
  dawiso_status: draft
  steward: Konysbayev Nurdaulet - konn07@vse.cz
  synonyms:
    - Customer Service Performance Dashboard Data
    - CS Operational KPI Snapshot
  acronyms:
    - CS KPI
    - NPS Aggregation
  related_capability: "Customer Service Performance Management"
  related_terms:
    - "Net Promoter Score (NPS)"
    - "First Contact Resolution (FCR)"
    - "Service Level Agreement (SLA)"
    - "Average Handling Time (AHT)"
    - "Churn Risk Scoring"
    - "Next Best Action (NBA)"
    - "Customer Segment"
    - "Escalation Rate"
